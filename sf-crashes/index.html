{
  const w = 700, h = 44, mx = 28, my = 6;
  const x = d3.scaleLinear().domain([2005, 2025]).range([mx, w - mx]);

  const line = d3.line().x(d => x(d.year)).y(d => y(d.crashes)).curve(d3.curveMonotoneX);

  const svg = d3.select("#overview").append("svg").attr("width", w).attr("height", h);

  svg.append("path")
    .datum(YEARLY)
    .attr("d", line)
    .attr("fill", "none")
    .attr("stroke", "#dcc")
    .attr("stroke-width", 1.5);

  svg.selectAll(".ov-dot")
    .data(YEARLY)
    .join("circle")
    .attr("class", "ov-dot")
    .attr("cx", d => x(d.year))
    .attr("cy", d => y(d.crashes))
    .attr("r", 3)
    .attr("fill", "#e8c4c4")
    .attr("stroke", "#a4133c")
    .attr("stroke-width", 0.8)
    .on("mouseover", (e, d) => {
      tooltip.style.display = "block";
      tooltip.querySelector(".tt-street").textContent = d.year;
      tooltip.querySelector(".tt-week").textContent = "";
      tooltip.querySelector(".tt-crashes").innerHTML = `<span class="tt-count">${d.crashes.toLocaleString()}</span> crashes · <span class="tt-fatal">💀 ${d.fatal} fatal</span>`;
    })
    .on("mousemove", (e) => {
      tooltip.style.left = (e.clientX + 14) + "px";
      tooltip.style.top = (e.clientY - 10) + "px";
    })
    .on("mouseout", () => { tooltip.style.display = "none"; })
    .on("click", (e, d) => {
      const el = document.querySelector(`[data-year="${d.year}"]`);
      if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
    });

  // Year labels — every 5 years + endpoints
  [2005, 2010, 2015, 2020, 2025].forEach(yr => {
    svg.append("text").attr("class", "ov-year").attr("x", x(yr)).attr("y", h).text(yr);
  });
}

const lookup = new Map();
DATA.forEach(d => {
  const key = `${d.year}|${d.street}|${d.week.toISOString()}`;
  lookup.set(key, { crashes: d.crashes, has_fatal: d.has_fatal, deaths: d.deaths });
});

// Build per-year street order
const yearStreets = new Map();
DATA.forEach(d => {
  if (!yearStreets.has(d.year)) yearStreets.set(d.year, new Map());
  const m = yearStreets.get(d.year);
  if (!m.has(d.street)) m.set(d.street, d.rank);
});

const allYears = [...yearStreets.keys()].sort((a, b) => b - a);
const maxCrashes = d3.max(DATA, d => d.crashes);

const colorScale = d3.scaleSequential()
  .domain([0, maxCrashes])
  .interpolator(t => d3.interpolateRgb("#f0f0f0", "#a4133c")(Math.pow(t, 0.55)));

const barScale = d3.scaleLinear()
  .domain([0, maxStreetTotal])
  .range([0, barMaxWidth]);

// Legend
const legendCanvas = document.getElementById("legendBar");
const lctx = legendCanvas.getContext("2d");
for (let i = 0; i < 180; i++) {
  lctx.fillStyle = colorScale(i / 180 * maxCrashes);
  lctx.fillRect(i, 0, 1, 10);
}
document.getElementById("legendMax").textContent = maxCrashes;

// Chart
const container = document.getElementById("chart");
const numWeeks = 54;
const heatmapEnd = streetLabelWidth + numWeeks * (cellSize + cellGap);
const svgWidth = heatmapEnd + barGap + barMaxWidth + 40;
const svgHeight = allYears.length * (blockHeight + blockGap);

const svg = d3.select(container)
  .append("svg")
  .attr("width", svgWidth)
  .attr("height", svgHeight)
  .attr("style", "max-width: 100%; height: auto;");

allYears.forEach((year, yi) => {
  const yOff = yi * (blockHeight + blockGap);
  const streets = [...yearStreets.get(year).entries()]
    .sort((a, b) => a[1] - b[1])
    .map(d => d[0]);

  const yearStart = new Date(year, 0, 1);
  const yearEnd = new Date(year + 1, 0, 1);
  const allWeeks = d3.timeMondays(d3.timeMonday.floor(yearStart), yearEnd)
    .filter(w => w.getFullYear() <= year);

  const g = svg.append("g")
    .attr("transform", `translate(0, ${yOff})`)
    .attr("data-year", year);

  // Year label + total
  const yt = yearTotals.get(year) || 0;
  const yf = yearFatals.get(year) || 0;
  g.append("text")
    .attr("class", "year-label")
    .attr("x", 0)
    .attr("y", 16)
    .text(year);

  g.append("text")
    .attr("class", "year-total")
    .attr("x", 42)
    .attr("y", 16)
    .html(`— ${yt.toLocaleString()} crashes, ${yf} fatal`);

  // Month labels
  d3.timeMonths(new Date(year, 0, 1), new Date(year + 1, 0, 1)).forEach(ms => {
    const idx = allWeeks.findIndex(w => w <= ms && d3.timeMonday.offset(w, 1) > ms);
    const finalIdx = idx >= 0 ? idx : allWeeks.findIndex(w => w >= ms);
    if (finalIdx >= 0) {
      g.append("text")
        .attr("class", "month-label")
        .attr("x", streetLabelWidth + finalIdx * (cellSize + cellGap))
        .attr("y", yearLabelHeight + 10)
        .text(monthNames[ms.getMonth()]);
    }
  });

  // Street labels + cells + bars
  streets.forEach((street, si) => {
    const cy = yearLabelHeight + monthLabelHeight + si * (cellSize + cellGap);

    // Street label
    g.append("text")
      .attr("class", "street-label")
      .attr("x", streetLabelWidth - 6)
      .attr("y", cy + cellSize - 1)
      .attr("text-anchor", "end")
      .text(prettyName(street));

    // Heatmap cells
    allWeeks.forEach((w, wi) => {
      const key = `${year}|${street}|${d3.timeMonday.floor(w).toISOString()}`;
      const info = lookup.get(key) || { crashes: 0, has_fatal: 0, deaths: 0 };
      const cx = streetLabelWidth + wi * (cellSize + cellGap);

      g.append("rect")
        .attr("class", "cell")
        .attr("x", cx)
        .attr("y", cy)
        .attr("width", cellSize)
        .attr("height", cellSize)
        .attr("fill", info.crashes === 0 ? "#f5f5f5" : colorScale(info.crashes))
        .attr("rx", 1.5)
        .attr("stroke", "none")
        .on("mouseover", () => {
          const weekEnd = new Date(w);
          weekEnd.setDate(weekEnd.getDate() + 6);
          const fmt = d3.timeFormat("%b %d");
          tooltip.style.display = "block";
          tooltip.querySelector(".tt-street").textContent = prettyName(street);
          tooltip.querySelector(".tt-week").textContent = `${fmt(w)} – ${fmt(weekEnd)}, ${year}`;
          let html = `<span class="tt-count">${info.crashes}</span> crash${info.crashes !== 1 ? "es" : ""}`;
          if (info.has_fatal) html += ` · <span class="tt-fatal">💀 ${info.deaths} death${info.deaths !== 1 ? "s" : ""}</span>`;
          tooltip.querySelector(".tt-crashes").innerHTML = html;
        })
        .on("mousemove", (event) => {
          tooltip.style.left = (event.clientX + 14) + "px";
          tooltip.style.top = (event.clientY - 10) + "px";
        })
        .on("mouseout", () => {
          tooltip.style.display = "none";
        });

      // Skull overlay for fatal weeks
      if (info.has_fatal) {
        g.append("text")
          .attr("class", "skull")
          .attr("x", cx + cellSize / 2)
          .attr("y", cy + cellSize / 2)
          .text("💀");
      }
    });

    // Stacked bar: injury (pink) + fatal (black)
    const streetTotal = totalLookup.get(`${year}|${street}`) || 0;
    const streetFatal = fatalLookup.get(`${year}|${street}`) || 0;
    const streetInjury = streetTotal - streetFatal;
    const barX = heatmapEnd + barGap;
    const barWInjury = barScale(streetInjury);
    const barWFatal = barScale(streetFatal);

    const barTooltip = () => {
      tooltip.style.display = "block";
      tooltip.querySelector(".tt-street").textContent = prettyName(street);
      tooltip.querySelector(".tt-week").textContent = `${year} yearly total`;
      let html = `<span class="tt-count">${streetInjury}</span> injury crash${streetInjury !== 1 ? "es" : ""}`;
      if (streetFatal > 0) html += ` · <span class="tt-fatal">💀 ${streetFatal} fatal</span>`;
      html += ` · <strong>${streetTotal}</strong> total`;
      tooltip.querySelector(".tt-crashes").innerHTML = html;
    };
    const barMove = (event) => {
      tooltip.style.left = (event.clientX + 14) + "px";
      tooltip.style.top = (event.clientY - 10) + "px";
    };
    const barOut = () => { tooltip.style.display = "none"; };

    g.append("rect")
      .attr("class", "bar-injury")
      .attr("x", barX)
      .attr("y", cy)
      .attr("width", barWInjury)
      .attr("height", barHeight)
      .attr("rx", barWFatal > 0 ? 0 : 1.5)
      .style("border-radius", "1.5px 0 0 1.5px")
      .style("cursor", "default")
      .on("mouseover", barTooltip)
      .on("mousemove", barMove)
      .on("mouseout", barOut);

    if (barWFatal > 0) {
      g.append("rect")
        .attr("class", "bar-fatal")
        .attr("x", barX + barWInjury)
        .attr("y", cy)
        .attr("width", Math.max(barWFatal, 2))
        .attr("height", barHeight)
        .attr("rx", 1.5)
        .style("cursor", "default")
        .on("mouseover", barTooltip)
        .on("mousemove", barMove)
        .on("mouseout", barOut);
    }

    // Label
    const totalBarW = barWInjury + Math.max(barWFatal, streetFatal > 0 ? 2 : 0);
    g.append("text")
      .attr("class", "bar-label")
      .attr("x", barX + totalBarW + 4)
      .attr("y", cy + cellSize - 1)
      .text(streetTotal);
  });

  // Month separator lines
  d3.timeMonths(new Date(year, 1, 1), new Date(year + 1, 0, 1)).forEach(ms => {
    const idx = allWeeks.findIndex(w => w <= ms && d3.timeMonday.offset(w, 1) > ms);
    const finalIdx = idx >= 0 ? idx : allWeeks.findIndex(w => w >= ms);
    if (finalIdx >= 0) {
      const x = streetLabelWidth + finalIdx * (cellSize + cellGap) - cellGap / 2;
      g.append("line")
        .attr("x1", x).attr("x2", x)
        .attr("y1", yearLabelHeight + monthLabelHeight - 2)
        .attr("y2", yearLabelHeight + monthLabelHeight + streetCount * (cellSize + cellGap))
        .attr("stroke", "#fff")
        .attr("stroke-width", 2);
    }
  });
});

</script>
</body>
</html>
