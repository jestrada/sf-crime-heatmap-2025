const cellSize = 14;
const cellGap = 2;
const streetLabelWidth = 130;
const yearLabelHeight = 22;
const monthLabelHeight = 16;
const streetCount = 5;
const barGap = cellGap;
const barMaxWidth = 140;
const barHeight = cellSize;
const blockHeight = yearLabelHeight + monthLabelHeight + streetCount * (cellSize + cellGap);
const blockGap = 14;

const prettyName = s => s
  .replace(/^0+/, "")
  .replace(" ST", " St").replace(" AVE", " Ave").replace(" BLVD", " Blvd");

const tooltip = document.getElementById("tooltip");
const monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

// Parse weekly
WEEKLY.forEach(d => {
  d.week = new Date(d.week + "T00:00:00");
  d.crashes = +d.crashes;
  d.rank = +d.rank;
  d.has_fatal = +d.has_fatal;
  d.deaths = +d.deaths;
});

// Lookups
const lookup = new Map();
WEEKLY.forEach(d => {
  const key = `${d.hood}|${d.street}|${d.week.toISOString()}`;
  lookup.set(key, { crashes: d.crashes, has_fatal: d.has_fatal, deaths: d.deaths });
});

const stTotalLookup = new Map();
const stFatalLookup = new Map();
let maxStreetTotal = 0;
STREET_TOTALS.forEach(d => {
  d.total = +d.total;
  d.fatal_crashes = +d.fatal_crashes;
  d.rank = +d.rank;
  stTotalLookup.set(`${d.hood}|${d.street}`, d.total);
  stFatalLookup.set(`${d.hood}|${d.street}`, d.fatal_crashes);
  if (d.total > maxStreetTotal) maxStreetTotal = d.total;
});

// Hood streets map
const hoodStreets = new Map();
STREET_TOTALS.forEach(d => {
  if (!hoodStreets.has(d.hood)) hoodStreets.set(d.hood, []);
  const arr = hoodStreets.get(d.hood);
  if (arr.length < 5) arr.push(d.street);
});

HOOD_OVERVIEW.forEach(d => { d.crashes = +d.crashes; d.fatal = +d.fatal; });
const hoodOrder = HOOD_OVERVIEW.map(d => d.hood);

const maxCrashes = d3.max(WEEKLY, d => d.crashes);
const colorScale = d3.scaleSequential()
  .domain([0, maxCrashes])
  .interpolator(t => d3.interpolateRgb("#f0f0f0", "#a4133c")(Math.pow(t, 0.55)));

const barScale = d3.scaleLinear()
  .domain([0, maxStreetTotal])
  .range([0, barMaxWidth]);

// Legend
const legendCanvas = document.getElementById("legendBar");
const lctx = legendCanvas.getContext("2d");
for (let i = 0; i < 180; i++) {
  lctx.fillStyle = colorScale(i / 180 * maxCrashes);
  lctx.fillRect(i, 0, 1, 10);
}
document.getElementById("legendMax").textContent = maxCrashes;

// --- Overview bar chart ---
{
  const bw = 36, bpad = 4, oh = 80, omx = 10, omy = 14;
  const ow = omx * 2 + hoodOrder.length * (bw + bpad);
  const maxHood = d3.max(HOOD_OVERVIEW, d => d.crashes);
  const by = d3.scaleLinear().domain([0, maxHood]).range([oh - omy, 6]);

  const svg = d3.select("#overview").append("svg").attr("width", ow).attr("height", oh + 14);

  HOOD_OVERVIEW.forEach((d, i) => {
    const bx = omx + i * (bw + bpad);
    const barH = oh - omy - by(d.crashes);

    svg.append("rect")
      .attr("class", "ov-bar")
      .attr("x", bx)
      .attr("y", by(d.crashes))
      .attr("width", bw)
      .attr("height", barH)
      .attr("fill", "#e8c4c4")
      .attr("rx", 2)
      .on("mouseover", () => {
        tooltip.style.display = "block";
        tooltip.querySelector(".tt-street").textContent = d.hood;
        tooltip.querySelector(".tt-week").textContent = "2025 total";
        tooltip.querySelector(".tt-crashes").innerHTML = `<span class="tt-count">${d.crashes}</span> crashes` + (d.fatal > 0 ? ` · <span class="tt-fatal">💀 ${d.fatal} fatal</span>` : "");
      })
      .on("mousemove", (e) => {
        tooltip.style.left = (e.clientX + 14) + "px";
        tooltip.style.top = (e.clientY - 10) + "px";
      })
      .on("mouseout", () => { tooltip.style.display = "none"; })
      .on("click", () => {
        const el = document.querySelector(`[data-hood="${d.hood}"]`);
        if (el) el.scrollIntoView({ behavior: "smooth", block: "start" });
      });

    // Rotated label
    svg.append("text")
      .attr("class", "ov-label")
      .attr("x", bx + bw / 2)
      .attr("y", oh + 10)
      .attr("text-anchor", "middle")
      .text(d.hood.slice(0, 3));
  });
}

// --- Main heatmap ---
const container = document.getElementById("chart");
const year = 2025;
const yearStart = new Date(year, 0, 1);
const yearEnd = new Date(year + 1, 0, 1);
const allWeeks = d3.timeMondays(d3.timeMonday.floor(yearStart), yearEnd)
  .filter(w => w.getFullYear() <= year);
const numWeeks = allWeeks.length;

const heatmapEnd = streetLabelWidth + numWeeks * (cellSize + cellGap);
const svgWidth = heatmapEnd + barGap + barMaxWidth + 40;
const svgHeight = hoodOrder.length * (blockHeight + blockGap);

const svg = d3.select(container)
  .append("svg")
  .attr("width", svgWidth)
  .attr("height", svgHeight)
  .attr("style", "max-width: 100%; height: auto;");

hoodOrder.forEach((hood, hi) => {
  const yOff = hi * (blockHeight + blockGap);
  const streets = hoodStreets.get(hood) || [];
  const hoodData = HOOD_OVERVIEW.find(d => d.hood === hood);
  const hoodTotal = hoodData ? hoodData.crashes : 0;
  const hoodFatal = hoodData ? hoodData.fatal : 0;

  const g = svg.append("g")
    .attr("transform", `translate(0, ${yOff})`)
    .attr("data-hood", hood);

  // Hood label
  g.append("text")
    .attr("class", "hood-label")
    .attr("x", 0)
    .attr("y", 16)
    .text(hood);

  g.append("text")
    .attr("class", "hood-total")
    .attr("x", hood.length * 8.5 + 8)
    .attr("y", 16)
    .html(`— ${hoodTotal} crashes` + (hoodFatal > 0 ? `, ${hoodFatal} fatal` : ""));

  // Month labels
  d3.timeMonths(new Date(year, 0, 1), new Date(year + 1, 0, 1)).forEach(ms => {
    const idx = allWeeks.findIndex(w => w <= ms && d3.timeMonday.offset(w, 1) > ms);
    const finalIdx = idx >= 0 ? idx : allWeeks.findIndex(w => w >= ms);
    if (finalIdx >= 0) {
      g.append("text")
        .attr("class", "month-label")
        .attr("x", streetLabelWidth + finalIdx * (cellSize + cellGap))
        .attr("y", yearLabelHeight + 12)
        .text(monthNames[ms.getMonth()]);
    }
  });

  // Streets
  streets.forEach((street, si) => {
    const cy = yearLabelHeight + monthLabelHeight + si * (cellSize + cellGap);

    g.append("text")
      .attr("class", "street-label")
      .attr("x", streetLabelWidth - 6)
      .attr("y", cy + cellSize - 2)
      .attr("text-anchor", "end")
      .text(prettyName(street));

    // Heatmap cells
    allWeeks.forEach((w, wi) => {
      const key = `${hood}|${street}|${d3.timeMonday.floor(w).toISOString()}`;
      const info = lookup.get(key) || { crashes: 0, has_fatal: 0, deaths: 0 };
      const cx = streetLabelWidth + wi * (cellSize + cellGap);

      g.append("rect")
        .attr("class", "cell")
        .attr("x", cx)
        .attr("y", cy)
        .attr("width", cellSize)
        .attr("height", cellSize)
        .attr("fill", info.crashes === 0 ? "#f5f5f5" : colorScale(info.crashes))
        .attr("rx", 1.5)
        .attr("stroke", "none")
        .on("mouseover", () => {
          const weekEnd = new Date(w);
          weekEnd.setDate(weekEnd.getDate() + 6);
          const fmt = d3.timeFormat("%b %d");
          tooltip.style.display = "block";
          tooltip.querySelector(".tt-street").textContent = `${prettyName(street)} · ${hood}`;
          tooltip.querySelector(".tt-week").textContent = `${fmt(w)} – ${fmt(weekEnd)}, 2025`;
          let html = `<span class="tt-count">${info.crashes}</span> crash${info.crashes !== 1 ? "es" : ""}`;
          if (info.has_fatal) html += ` · <span class="tt-fatal">💀 ${info.deaths} death${info.deaths !== 1 ? "s" : ""}</span>`;
          tooltip.querySelector(".tt-crashes").innerHTML = html;
        })
        .on("mousemove", (e) => {
          tooltip.style.left = (e.clientX + 14) + "px";
          tooltip.style.top = (e.clientY - 10) + "px";
        })
        .on("mouseout", () => { tooltip.style.display = "none"; });

      if (info.has_fatal) {
        g.append("text")
          .attr("class", "skull")
          .attr("x", cx + cellSize / 2)
          .attr("y", cy + cellSize / 2)
          .text("💀");
      }
    });

    // Bar chart
    const streetTotal = stTotalLookup.get(`${hood}|${street}`) || 0;
    const streetFatal = stFatalLookup.get(`${hood}|${street}`) || 0;
    const streetInjury = streetTotal - streetFatal;
    const barX = streetLabelWidth + allWeeks.length * (cellSize + cellGap) + cellGap;
    const barWInjury = barScale(streetInjury);
    const barWFatal = barScale(streetFatal);

    const barTooltip = () => {
      tooltip.style.display = "block";
      tooltip.querySelector(".tt-street").textContent = `${prettyName(street)} · ${hood}`;
      tooltip.querySelector(".tt-week").textContent = "2025 yearly total";
      let html = `<span class="tt-count">${streetInjury}</span> injury crash${streetInjury !== 1 ? "es" : ""}`;
      if (streetFatal > 0) html += ` · <span class="tt-fatal">💀 ${streetFatal} fatal</span>`;
      html += ` · <strong>${streetTotal}</strong> total`;
      tooltip.querySelector(".tt-crashes").innerHTML = html;
    };
    const barMove = (e) => {
      tooltip.style.left = (e.clientX + 14) + "px";
      tooltip.style.top = (e.clientY - 10) + "px";
    };
    const barOut = () => { tooltip.style.display = "none"; };

    g.append("rect")
      .attr("class", "bar-injury")
      .attr("x", barX)
      .attr("y", cy)
      .attr("width", barWInjury)
      .attr("height", barHeight)
      .attr("rx", barWFatal > 0 ? 0 : 1.5)
      .style("cursor", "default")
      .on("mouseover", barTooltip)
      .on("mousemove", barMove)
      .on("mouseout", barOut);

    if (barWFatal > 0) {
      g.append("rect")
        .attr("class", "bar-fatal")
        .attr("x", barX + barWInjury)
        .attr("y", cy)
        .attr("width", Math.max(barWFatal, 2))
        .attr("height", barHeight)
        .attr("rx", 1.5)
        .style("cursor", "default")
        .on("mouseover", barTooltip)
        .on("mousemove", barMove)
        .on("mouseout", barOut);
    }

    const totalBarW = barWInjury + Math.max(barWFatal, streetFatal > 0 ? 2 : 0);
    g.append("text")
      .attr("class", "bar-label")
      .attr("x", barX + totalBarW + 4)
      .attr("y", cy + cellSize - 2)
      .text(streetTotal);
  });

  // Month separators
  d3.timeMonths(new Date(year, 1, 1), new Date(year + 1, 0, 1)).forEach(ms => {
    const idx = allWeeks.findIndex(w => w <= ms && d3.timeMonday.offset(w, 1) > ms);
    const finalIdx = idx >= 0 ? idx : allWeeks.findIndex(w => w >= ms);
    if (finalIdx >= 0) {
      const x = streetLabelWidth + finalIdx * (cellSize + cellGap) - cellGap / 2;
      g.append("line")
        .attr("x1", x).attr("x2", x)
        .attr("y1", yearLabelHeight + monthLabelHeight - 2)
        .attr("y2", yearLabelHeight + monthLabelHeight + streetCount * (cellSize + cellGap))
        .attr("stroke", "#fff")
        .attr("stroke-width", 2);
    }
  });
});

</script>
</body>
</html>
