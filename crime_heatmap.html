            align-items: center;

        .cell { stroke: none; }
        .cell:hover { stroke: #333; stroke-width: 1px; }
        .skull { pointer-events: none; }
        .tooltip {
            position: absolute;
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-size: 11px;
            pointer-events: none;
            z-index: 1000;
            display: none;
        }
        .tooltip .homicide-note {
            color: #ff6b6b;
            font-weight: bold;
        }
        .tabs {
            display: flex;
            gap: 0;
            margin-left: 20px;
        }
        .tab {
            padding: 6px 16px;
            background: #eee;
            border: 1px solid #ccc;
            border-bottom: none;
            border-radius: 6px 6px 0 0;
            cursor: pointer;
            font-size: 12px;
            font-weight: 500;
            color: #666;
        }
        .tab.active {
            background: white;
            color: #333;
            border-bottom: 1px solid white;
            margin-bottom: -1px;
            z-index: 1;
        }

        const weeks = Object.keys(data[0]).filter(d => d.startsWith('week_')).map(d => parseInt(d.split('_')[1]));
        
        let maxValue = 0;
        data.forEach(row => {
            weeks.forEach(week => {
                const val = parseInt(row[`week_${week}`]) || 0;
                if (val > maxValue) maxValue = val;
            });
        });

        // Build homicide lookup
        const homicideLookup = {};
        homicideData.forEach(row => {
            weeks.forEach(week => {
                const val = parseInt(row[`week_${week}`]) || 0;
                if (val > 0) {
                    homicideLookup[row.neighborhood + '_' + week] = val;
                }
            });
        });

        const colorScale = d3.scaleLinear()
            .domain([0, maxValue])
            .range(["#f7fbff", "#d62728"]);

        const chartDiv = document.getElementById('chart');
        const availableWidth = chartDiv.clientWidth;
        const availableHeight = chartDiv.clientHeight;

        const marginLeft = 135;
        const marginTop = 20;
        const marginRight = 10;
        const marginBottom = 10;

        const gridWidth = availableWidth - marginLeft - marginRight;
        const gridHeight = availableHeight - marginTop - marginBottom;
        const cellWidth = gridWidth / 52;
        const cellHeight = gridHeight / 41;

        const svg = d3.select('#chart')
            .append('svg')
            .attr('width', availableWidth)
            .attr('height', availableHeight);

        svg.selectAll('.neighborhood-label')
            .data(data)
            .enter()
            .append('text')
            .attr('class', 'neighborhood-label')
            .attr('x', marginLeft - 5)
            .attr('y', (d, i) => marginTop + (i * cellHeight) + (cellHeight / 2))
            .attr('dy', '0.35em')
            .attr('text-anchor', 'end')
            .attr('font-size', Math.min(11, Math.max(7, cellHeight * 0.7)) + 'px')
            .text(d => d.neighborhood);

            [1, 'Jan'], [5, 'Feb'], [9, 'Mar'], [14, 'Apr'], [18, 'May'], [22, 'Jun'],
            [27, 'Jul'], [31, 'Aug'], [36, 'Sep'], [40, 'Oct'], [44, 'Nov'], [49, 'Dec']
        ];
        monthStarts.forEach(([week, label]) => {
            const x = marginLeft + ((week - 1) * cellWidth) + (cellWidth / 2);
            svg.append('text')
                .attr('class', 'week-label')
                .attr('x', x)
                .attr('y', marginTop - 5)
                .attr('font-size', Math.min(10, Math.max(7, cellHeight * 0.6)) + 'px')
                .text(label);
        });

        // Flatten data for cells
        const cellData = data.flatMap((row, rowIdx) =>
            weeks.map(week => ({
                neighborhood: row.neighborhood,
                week: week,
                value: parseInt(row[`week_${week}`]) || 0,
                homicides: homicideLookup[row.neighborhood + '_' + week] || 0,
                rowIdx: rowIdx,
                colIdx: week - 1
            }))
        );

        // Draw cells
        svg.selectAll('.cell')
            .data(cellData)
            .enter()
            .append('rect')
            .attr('class', 'cell')
            .attr('x', d => marginLeft + (d.colIdx * cellWidth))
            .attr('y', d => marginTop + (d.rowIdx * cellHeight))
            .attr('width', cellWidth - 0.5)
            .attr('height', cellHeight - 0.5)
            .attr('fill', d => d.value === 0 ? '#f7f7f7' : colorScale(d.value))
            .on('mouseover', function(event, d) {

        homicideCells.forEach(d => {
            const x = marginLeft + (d.colIdx * cellWidth);
            const y = marginTop + (d.rowIdx * cellHeight);
            const iconSize = Math.min(cellWidth, cellHeight) * 0.85;

        // ===== TAB SWITCHING =====
        function renderYearly() {
            d3.select('#chart').select('svg').remove();
            const years = [2018,2019,2020,2021,2022,2023,2024,2025];
            const numCols = years.length;
            const numRows = yearlyData.length;

            let yMaxValue = 0;
            yearlyData.forEach(row => {
                years.forEach(y => {
                    const val = parseInt(row[`y_${y}`]) || 0;
                    if (val > yMaxValue) yMaxValue = val;
                });
            });

            const yHomicideLookup = {};
            yearlyHomicideData.forEach(row => {
                years.forEach(y => {
                    const val = parseInt(row[`y_${y}`]) || 0;
                    if (val > 0) yHomicideLookup[row.neighborhood + '_' + y] = val;
                });
            });

            const yColorScale = d3.scaleLinear().domain([0, yMaxValue]).range(["#f7fbff", "#d62728"]);

            const cDiv = document.getElementById('chart');
            const aW = cDiv.clientWidth;
            const aH = cDiv.clientHeight;
            const mL = 135, mT = 30, mR = 10, mB = 10;
            const gW = aW - mL - mR;
            const gH = aH - mT - mB;
            const cW = gW / numCols;
            const cH = gH / numRows;

            const ySvg = d3.select('#chart').append('svg').attr('width', aW).attr('height', aH);

            ySvg.selectAll('.neighborhood-label').data(yearlyData).enter()
                .append('text').attr('class', 'neighborhood-label')
                .attr('x', mL - 5).attr('y', (d, i) => mT + (i * cH) + (cH / 2))
                .attr('dy', '0.35em').attr('text-anchor', 'end')
                .attr('font-size', Math.min(11, Math.max(7, cH * 0.7)) + 'px')
                .text(d => d.neighborhood);

            years.forEach((y, i) => {
                ySvg.append('text').attr('class', 'week-label')
                    .attr('x', mL + (i * cW) + (cW / 2)).attr('y', mT - 8)
                    .attr('font-size', Math.min(13, Math.max(9, cW * 0.15)) + 'px')
                    .text(y);
            });

            const yCellData = yearlyData.flatMap((row, rowIdx) =>
                years.map((y, colIdx) => ({
                    neighborhood: row.neighborhood, year: y,
                    value: parseInt(row[`y_${y}`]) || 0,
                    homicides: yHomicideLookup[row.neighborhood + '_' + y] || 0,
                    rowIdx, colIdx
                }))
            );

            ySvg.selectAll('.cell').data(yCellData).enter()
                .append('rect').attr('class', 'cell')
                .attr('x', d => mL + (d.colIdx * cW))
                .attr('y', d => mT + (d.rowIdx * cH))
                .attr('width', cW - 1).attr('height', cH - 1)
                .attr('fill', d => d.value === 0 ? '#f7f7f7' : yColorScale(d.value))
                .on('mouseover', function(event, d) {
                    const tooltip = d3.select('#tooltip');
                    let html = `<strong>${d.neighborhood}</strong><br/>${d.year}: ${d.value.toLocaleString()} incidents`;
                    if (d.homicides > 0) html += `<br/><span class="homicide-note">💀 ${d.homicides} homicide${d.homicides > 1 ? 's' : ''}</span>`;
                    tooltip.style('display', 'block').html(html)
                        .style('left', (event.pageX + 10) + 'px').style('top', (event.pageY - 28) + 'px');
                })
                .on('mouseout', function() { d3.select('#tooltip').style('display', 'none'); });

            yCellData.filter(d => d.homicides > 0).forEach(d => {
                const x = mL + (d.colIdx * cW);
                const y = mT + (d.rowIdx * cH);
                const iconSize = Math.min(cW, cH) * 0.7;
                const oX = (cW - iconSize) / 2;
                const oY = (cH - iconSize) / 2;
                ySvg.append('use').attr('href', '#skull-icon')
                    .attr('x', x + oX).attr('y', y + oY)
                    .attr('width', iconSize).attr('height', iconSize)
                    .attr('class', 'skull').attr('opacity', 0.8);
            });
        }

        function renderWeekly() {
            d3.select('#chart').select('svg').remove();
            // Re-render weekly (same as initial)
            const wSvg = d3.select('#chart').append('svg').attr('width', availableWidth).attr('height', availableHeight);
            wSvg.selectAll('.neighborhood-label').data(data).enter()
                .append('text').attr('class', 'neighborhood-label')
                .attr('x', marginLeft - 5).attr('y', (d, i) => marginTop + (i * cellHeight) + (cellHeight / 2))
                .attr('dy', '0.35em').attr('text-anchor', 'end')
                .attr('font-size', Math.min(11, Math.max(7, cellHeight * 0.7)) + 'px')
                .text(d => d.neighborhood);
            monthStarts.forEach(([week, label]) => {
                const x = marginLeft + ((week - 1) * cellWidth) + (cellWidth / 2);
                wSvg.append('text').attr('class', 'week-label').attr('x', x).attr('y', marginTop - 5)
                    .attr('font-size', Math.min(10, Math.max(7, cellHeight * 0.6)) + 'px').text(label);
            });
            wSvg.selectAll('.cell').data(cellData).enter()
                .append('rect').attr('class', 'cell')
                .attr('x', d => marginLeft + (d.colIdx * cellWidth))
                .attr('y', d => marginTop + (d.rowIdx * cellHeight))
                .attr('width', cellWidth - 0.5).attr('height', cellHeight - 0.5)
                .attr('fill', d => d.value === 0 ? '#f7f7f7' : colorScale(d.value))
                .on('mouseover', function(event, d) {
                    const tooltip = d3.select('#tooltip');
                    let html = `<strong>${d.neighborhood}</strong><br/>Week ${d.week}: ${d.value} incidents`;
                    if (d.homicides > 0) html += `<br/><span class="homicide-note">💀 ${d.homicides} homicide${d.homicides > 1 ? 's' : ''}</span>`;
                    tooltip.style('display', 'block').html(html)
                        .style('left', (event.pageX + 10) + 'px').style('top', (event.pageY - 28) + 'px');
                })
                .on('mouseout', function() { d3.select('#tooltip').style('display', 'none'); });
            homicideCells.forEach(d => {
                const x = marginLeft + (d.colIdx * cellWidth);
                const y = marginTop + (d.rowIdx * cellHeight);
                const iconSize = Math.min(cellWidth, cellHeight) * 0.85;
                const oX = (cellWidth - iconSize) / 2;
                const oY = (cellHeight - iconSize) / 2;
                wSvg.append('use').attr('href', '#skull-icon')
                    .attr('x', x + oX).attr('y', y + oY)
                    .attr('width', iconSize).attr('height', iconSize)
                    .attr('class', 'skull').attr('opacity', 0.8);
            });
        }

        window.switchTab = function(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            if (tab === 'yearly') {
                document.querySelectorAll('.tab')[1].classList.add('active');
                renderYearly();
            } else {
                document.querySelectorAll('.tab')[0].classList.add('active');
                renderWeekly();
            }
        };
    </script>
